description = "新しい問題用のディレクトリと初期ファイルを生成します（例: /init_problem 21. Merge Two Sorted Lists）"

prompt = """
ユーザーが問題のタイトルを提供しました: {{args}}

以下の手順で新しい問題のディレクトリを初期化してください：

1. 引数（例: "21. Merge Two Sorted Lists"）を解析し、問題番号とタイトルを抽出してください。
2. ディレクトリ名を以下の規則で決定してください：
   - 形式: `problem_[4桁に0埋めした番号]_[スペースをアンダーバーに置換したタイトル]`
   - 例: `21. Merge Two Sorted Lists` -> `problem_0021_Merge_Two_Sorted_Lists`
3. `problems/` ディレクトリ配下に、上記で決定した名前のディレクトリを作成してください。
4. 作成したディレクトリ内に以下の3つのファイルを作成してください：
   - `__init__.py`: 空의ファイル。
   - `description.md`: 1行目に `# {{args}}` （元の入力タイトル）を記述したファイル。
   - `main.py`: 以下の内容を記述したファイル。
     ```python
     class Solution:
         pass
     ```

完了したら、作成したディレクトリのパスを報告してください。
"""
